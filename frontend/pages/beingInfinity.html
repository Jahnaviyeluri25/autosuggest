<!DOCTYPE html>
<html lang="en"> <!--start tag says lang is english-->
<head>
    <meta charset="UTF-8">  <!--meta tags are not used or shown to the end users/on the page-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Suggest</title>
    <link rel="stylesheet" href="../css/beingInfinity.css"> <!--linking the css file in head always-->
</head>
<body>
    <div class="status">
        <span class="gear">&#x2699</span>
        <span class="dot">&#x25CF</span>
        <span class="onl">Online</span>
        <span class="sep">|</span>
        <span class="clock">&#x1F550</span>
        <span class="latency">- ms</span>
    </div>
    <div class="main-content">
       <h1> 
            <span id="B">Being</span><span id="I">Infinity</span>
       </h1>
       <p id="para">One million phrases. Four algorithms. Prefix Based Auto Suggest.</p>
       <div>
           <span class="search-icon">&#x1F50D</span>
           <input type="text" id="search-input" placeholder="Start typing to search...">
           <div id="search-suggestions">
                 
           </div>
       </div>
       
    </div>
   
    <script src="../js/beingInfinity.js"></script> <!--linking js files in body always-->
</body>
</html>
