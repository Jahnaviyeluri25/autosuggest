<!DOCTYPE html>
<html lang="en"> <!--start tag says lang is english-->
<head>
    <meta charset="UTF-8">  <!--meta tags are not used or shown to the end users/on the page-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Suggest</title>
    <link rel="stylesheet" href="css/index.css"> <!--linking the css file in head always-->
</head>
<body>
    <div class="status">
        <span class="gear">&#x2699</span>
        <span class="dot"></span>
        <span>Online</span>
        <span class="separator">|</span>
        <span class="clock">&#x1F550</span>
        <span id="latency">- ms</span>
    </div>

    <h1> BeingInfinity</h1>
    <p>One million phrases. Four algorithms. Prefix Based Auto Suggest.</p>

    <div class="search-bar">
        <span class="clock">&#x1F50D</span>
      <input type="text" id="search-input" placeholder="Start typing to search...">
    </div>
   
    <script src="../js/index.js"></script> <!--linking js files in body always-->
</body>
</html>
